<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<title>IBS HI Sale Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --bg: #0e1117;
    --bg-elev: #161b22;
    --bg-elev-2: #1f242c;
    --border: #30363d;
    --text: #e6edf3;
    --text-mute: #8b949e;
    --accent: #2f81f7;
    --ok: #3fb950;
    --warn: #d29922;
    --crit: #f85149;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  button {
    background: var(--bg-elev-2); color: var(--text);
    border: 1px solid var(--border); padding: 6px 12px;
    border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  button:hover { background: var(--border); }
  button.primary { background: var(--accent); border-color: var(--accent); }
  button.primary:hover { background: #1f6feb; }
  button.danger { background: #21262d; border-color: var(--crit); color: var(--crit); }
  input, select, textarea {
    background: var(--bg-elev); color: var(--text);
    border: 1px solid var(--border); padding: 6px 10px;
    border-radius: 6px; font-size: 13px; font-family: inherit;
    width: 100%;
  }
  textarea { font-family: inherit; min-height: 80px; }
  table { width: 100%; border-collapse: collapse; }
  th, td {
    text-align: left; padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  th { color: var(--text-mute); font-weight: 600; }
  tr:hover td { background: var(--bg-elev); }

  /* Layout */
  #app { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
  #sidebar {
    background: var(--bg-elev); border-right: 1px solid var(--border);
    padding: 16px 0;
  }
  #sidebar .brand {
    padding: 0 16px 16px; border-bottom: 1px solid var(--border);
    font-weight: 700; font-size: 16px;
  }
  #sidebar .brand small { color: var(--text-mute); font-weight: 400; font-size: 11px; display: block; }
  #sidebar nav { padding: 12px 0; }
  #sidebar nav a {
    display: block; padding: 8px 16px; color: var(--text); font-size: 13px;
  }
  #sidebar nav a.active { background: var(--bg-elev-2); border-left: 3px solid var(--accent); padding-left: 13px; }
  #sidebar nav a:hover { background: var(--bg-elev-2); text-decoration: none; }
  #sidebar .badge {
    background: var(--crit); color: #fff; font-size: 10px;
    padding: 1px 6px; border-radius: 8px; margin-left: 6px;
  }
  #main { display: flex; flex-direction: column; min-width: 0; }
  #topbar {
    background: var(--bg-elev); border-bottom: 1px solid var(--border);
    padding: 10px 20px; display: flex; align-items: center; justify-content: space-between;
  }
  #topbar .user { color: var(--text-mute); font-size: 13px; }
  #topbar .user b { color: var(--text); }
  #content { padding: 24px; flex: 1; overflow: auto; }

  h1 { font-size: 20px; margin: 0 0 16px; }
  h2 { font-size: 16px; margin: 24px 0 12px; }
  .muted { color: var(--text-mute); }
  .right { text-align: right; }

  /* Cards */
  .grid { display: grid; gap: 12px; }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-2 { grid-template-columns: 1fr 1fr; }
  .card {
    background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
  }
  .card h3 { margin: 0 0 8px; font-size: 13px; color: var(--text-mute); font-weight: 500; }
  .card .big { font-size: 24px; font-weight: 600; }
  .card .sub { color: var(--text-mute); font-size: 12px; margin-top: 4px; }

  /* Status pills */
  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 500; text-transform: uppercase;
  }
  .pill-ok { background: rgba(63,185,80,.15); color: var(--ok); }
  .pill-warn { background: rgba(210,153,34,.15); color: var(--warn); }
  .pill-crit { background: rgba(248,81,73,.15); color: var(--crit); }
  .pill-info { background: rgba(47,129,247,.15); color: var(--accent); }

  /* Login overlay */
  #login {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: var(--bg); z-index: 999;
  }
  #login .box { width: 360px; padding: 32px; background: var(--bg-elev);
    border: 1px solid var(--border); border-radius: 10px; }
  #login h1 { font-size: 18px; }
  #login .err { color: var(--crit); margin-top: 8px; min-height: 18px; font-size: 12px; }

  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .toolbar input, .toolbar select { width: auto; min-width: 200px; }
  .toolbar .spacer { flex: 1; }

  .empty { text-align: center; color: var(--text-mute); padding: 32px; }

  /* Modal */
  #modal {
    position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none;
    align-items: center; justify-content: center; z-index: 100;
  }
  #modal.open { display: flex; }
  #modal .box {
    background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: 8px; padding: 24px; max-width: 920px; max-height: 88vh;
    overflow: auto; width: 92%;
  }
  .form-row { margin-bottom: 12px; }
  .form-row label { display: block; font-size: 12px; color: var(--text-mute); margin-bottom: 4px; }

  /* Kanban */
  .kanban { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .kanban .col { background: var(--bg-elev); border-radius: 6px; padding: 8px; }
  .kanban .col h3 { font-size: 12px; margin: 4px 0 8px; padding: 0 4px; }
  .kanban .item {
    background: var(--bg-elev-2); border: 1px solid var(--border);
    border-radius: 4px; padding: 8px; margin-bottom: 6px; font-size: 12px;
  }

  /* Search results */
  .search-result { display: block; padding: 8px 12px; border-radius: 4px; }
  .search-result:hover { background: var(--bg-elev-2); text-decoration: none; }
  .search-result .type {
    display: inline-block; min-width: 70px; font-size: 10px;
    color: var(--text-mute); text-transform: uppercase;
  }

  /* Tabs (Phase 2 — customer 360 / contract detail) */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .tabs button {
    background: transparent; border: none; border-bottom: 2px solid transparent;
    border-radius: 0; padding: 8px 16px; color: var(--text-mute); font-weight: 500;
  }
  .tabs button.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Kanban drag-drop */
  .kanban { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; min-height: 500px; }
  .kanban .col {
    background: var(--bg-elev); border-radius: 6px; padding: 8px;
    transition: background 0.15s;
  }
  .kanban .col.drag-over { background: var(--bg-elev-2); outline: 2px dashed var(--accent); }
  .kanban .col h3 { font-size: 12px; margin: 4px 0 8px; padding: 0 4px; display: flex; justify-content: space-between; }
  .kanban .item {
    background: var(--bg-elev-2); border: 1px solid var(--border);
    border-radius: 4px; padding: 8px; margin-bottom: 6px; font-size: 12px;
    cursor: grab; user-select: none;
  }
  .kanban .item:hover { border-color: var(--accent); }
  .kanban .item.dragging { opacity: 0.4; cursor: grabbing; }
  .kanban .item .priority { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }
  .kanban .item .priority.HIGH, .kanban .item .priority.URGENT { background: var(--crit); }
  .kanban .item .priority.NORMAL { background: var(--accent); }
  .kanban .item .priority.LOW { background: var(--text-mute); }

  /* 3-panel email layout */
  .three-pane { display: grid; grid-template-columns: 200px 360px 1fr; gap: 12px; height: calc(100vh - 180px); }
  .three-pane > div { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 6px; padding: 12px; overflow: auto; }
  .email-row { padding: 8px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 12px; }
  .email-row:hover { background: var(--bg-elev-2); }
  .email-row.active { background: var(--bg-elev-2); border-left: 3px solid var(--accent); padding-left: 5px; }
  .email-row.unread { font-weight: 600; }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    display: flex; flex-direction: column; gap: 8px;
  }
  .toast {
    background: var(--bg-elev-2); border: 1px solid var(--border);
    border-left: 3px solid var(--accent); border-radius: 6px;
    padding: 10px 16px; min-width: 240px; font-size: 13px;
    animation: slideIn 0.2s ease-out;
  }
  .toast.ok { border-left-color: var(--ok); }
  .toast.warn { border-left-color: var(--warn); }
  .toast.err { border-left-color: var(--crit); }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* Stage transition buttons (Pipeline) */
  .stage-buttons { display: flex; gap: 6px; flex-wrap: wrap; margin: 12px 0; }
  .stage-buttons button {
    font-size: 11px; padding: 4px 10px; text-transform: uppercase;
  }

  /* Notification dropdown */
  .notif-dropdown {
    position: absolute; top: 48px; right: 80px; width: 360px; max-height: 480px;
    overflow: auto; background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: 6px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); display: none; z-index: 50;
  }
  .notif-dropdown.open { display: block; }
  .notif-dropdown .notif-item { padding: 10px 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .notif-dropdown .notif-item:hover { background: var(--bg-elev-2); }
  .notif-dropdown .notif-item.unread { background: rgba(47,129,247,0.05); }

  /* Breadcrumb */
  .breadcrumb { color: var(--text-mute); font-size: 12px; margin-bottom: 8px; }
  .breadcrumb a { color: var(--text-mute); }
  .breadcrumb a:hover { color: var(--text); }
  .breadcrumb .sep { margin: 0 6px; }

  /* Skeleton loading */
  .skel { background: linear-gradient(90deg, var(--bg-elev) 25%, var(--bg-elev-2) 50%, var(--bg-elev) 75%);
          background-size: 200% 100%; animation: skel 1.2s infinite; height: 14px; border-radius: 4px; margin: 6px 0; }
  @keyframes skel { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* Clickable KPI cards (dashboard drill-down) */
  .card.clickable { cursor: pointer; transition: border-color 0.15s, transform 0.05s; }
  .card.clickable:hover { border-color: var(--accent); }
  .card.clickable:active { transform: translateY(1px); }
</style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="login">
  <div class="box">
    <h1>IBS HI Sale Platform</h1>
    <p class="muted">Enter your X-API-Key to continue.</p>
    <div class="form-row">
      <input id="login-key" type="password" placeholder="X-API-Key" autofocus />
    </div>
    <button class="primary" style="width:100%" onclick="doLogin()">Sign in</button>
    <div class="err" id="login-err"></div>
    <p id="dev-hint" class="muted" style="margin-top:24px;font-size:11px;display:none">
      Dev fallback key: <code>dev-key-local-only</code> (only works when SALE_ENV=development).
    </p>
  </div>
</div>

<!-- APP SHELL -->
<div id="app" style="display:none">
  <aside id="sidebar">
    <div class="brand">IBS HI Sale<small>Sale Platform v4</small></div>
    <nav>
      <a href="#dashboard" data-screen="dashboard">Dashboard</a>
      <a href="#my" data-screen="my">My Day</a>
      <a href="#customers" data-screen="customers">Customers</a>
      <a href="#pipeline" data-screen="pipeline">Pipeline</a>
      <a href="#quotations" data-screen="quotations">Quotations</a>
      <a href="#tasks" data-screen="tasks">Tasks</a>
      <a href="#emails" data-screen="emails">Emails</a>
      <a href="#contracts" data-screen="contracts">Contracts</a>
      <a href="#reports" data-screen="reports">Reports</a>
      <a href="#search" data-screen="search">Search</a>
    </nav>
  </aside>
  <main id="main">
    <header id="topbar">
      <div>
        <input id="quicksearch" placeholder="Quick search…"
               style="width:260px"
               onkeydown="if(event.key==='Enter')doQuickSearch()" />
      </div>
      <div class="user">
        <span id="notif-bell" style="margin-right:12px;cursor:pointer"
              onclick="navigate('notifications')" title="Notifications"></span>
        <b id="user-label">…</b> ·
        <span id="tier-label" class="muted"></span> ·
        <a href="#" onclick="doLogout();return false">Sign out</a>
      </div>
    </header>
    <section id="content"><p class="muted">Loading…</p></section>
  </main>
</div>

<!-- MODAL -->
<div id="modal" onclick="if(event.target===this)closeModal()">
  <div class="box" id="modal-box"></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- NOTIFICATION DROPDOWN -->
<div id="notif-dropdown" class="notif-dropdown"></div>

<script>
'use strict';

// ─── Config ──────────────────────────────────────────────────────────
const API_BASE = window.location.origin + '/api/v1';
let API_KEY = sessionStorage.getItem('apiKey') || '';
let CURRENT_USER = null;       // { tier, profile: {email, user_name, ...} }

// ─── HTTP helpers ────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const headers = {
    'X-API-Key': API_KEY,
    ...(opts.headers || {}),
  };
  if (opts.body && typeof opts.body !== 'string' && !(opts.body instanceof FormData)) {
    headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(opts.body);
  }
  const r = await fetch(API_BASE + path, { ...opts, headers });
  if (r.status === 401) {
    sessionStorage.removeItem('apiKey');
    location.reload();
    throw new Error('Unauthorized');
  }
  if (!r.ok) {
    let msg = `HTTP ${r.status}`;
    try { msg = (await r.json()).detail || msg; } catch {}
    throw new Error(msg);
  }
  const ct = r.headers.get('Content-Type') || '';
  if (ct.includes('application/json')) return r.json();
  return r.text();
}

function fmt(n, currency = '') {
  if (n == null || n === '') return '—';
  if (typeof n !== 'number') n = Number(n);
  if (isNaN(n)) return String(n);
  if (Math.abs(n) >= 1_000_000) return currency + (n / 1_000_000).toFixed(2) + 'M';
  if (Math.abs(n) >= 1000) return currency + (n / 1000).toFixed(1) + 'k';
  return currency + n.toLocaleString();
}
function pill(text, kind = 'info') {
  return `<span class="pill pill-${kind}">${escapeHtml(text)}</span>`;
}
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, (c) => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}
function statusPill(s) {
  const k = String(s || '').toUpperCase();
  if (['WON','COMPLETED','PAID','APPROVED','DONE','OK','ACTIVE'].includes(k)) return pill(k, 'ok');
  if (['LOST','CANCELLED','REJECTED','VOID','OVERDUE','DELETED','CRIT','ERROR'].includes(k)) return pill(k, 'crit');
  if (['PENDING','SENT','NEGOTIATION','IN_PROGRESS','DRAFT','WARN','EXPIRED','CALCULATED'].includes(k)) return pill(k, 'warn');
  return pill(k || '?', 'info');
}

// ─── Login ───────────────────────────────────────────────────────────
async function doLogin() {
  const key = document.getElementById('login-key').value.trim();
  if (!key) return;
  API_KEY = key;
  try {
    const me = await api('/auth/me');
    sessionStorage.setItem('apiKey', key);
    CURRENT_USER = me;
    bootApp();
  } catch (e) {
    document.getElementById('login-err').textContent = e.message || 'Login failed';
  }
}
function doLogout() {
  sessionStorage.removeItem('apiKey');
  location.reload();
}

async function tryAutoLogin() {
  // Public /auth/info — flips the dev-key hint on/off based on SALE_ENV
  try {
    const info = await fetch(API_BASE + '/auth/info').then(r => r.json());
    if (info.is_dev_env) {
      const hint = document.getElementById('dev-hint');
      if (hint) hint.style.display = '';
    }
  } catch {}

  if (!API_KEY) { showLogin(); return; }
  try {
    CURRENT_USER = await api('/auth/me');
    bootApp();
  } catch {
    showLogin();
  }
}
function showLogin() {
  document.getElementById('login').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}
function bootApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'grid';
  const profile = CURRENT_USER.profile || {};
  // Per-key label takes priority — surfaces "Tester Alice" etc when set
  const display = CURRENT_USER.label
    || profile.user_name
    || profile.email
    || '(no profile)';
  document.getElementById('user-label').textContent = display;
  document.getElementById('tier-label').textContent = CURRENT_USER.tier;
  refreshNotificationBell();
  setInterval(refreshNotificationBell, 60000);
  // route by hash
  navigate((location.hash || '#dashboard').slice(1));
  window.addEventListener('hashchange', () => {
    navigate((location.hash || '#dashboard').slice(1));
  });
}

async function refreshNotificationBell() {
  try {
    const d = await api('/notifications/count');
    const bell = document.getElementById('notif-bell');
    if (d.unread > 0) bell.innerHTML = `🔔 <span class="pill pill-crit">${d.unread}</span>`;
    else bell.innerHTML = '🔔';
  } catch {}
}

// ─── Toast notifications (Phase 2) ────────────────────────────────
function toast(message, kind = 'info', ms = 3000) {
  const wrap = document.getElementById('toast');
  const el = document.createElement('div');
  el.className = 'toast ' + kind;
  el.textContent = message;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), ms);
}

// ─── Tabs (Phase 2 — used in customer 360, contract detail) ──────
function activateTab(modalRoot, tabName) {
  modalRoot.querySelectorAll('.tabs button').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tabName);
  });
  modalRoot.querySelectorAll('.tab-panel').forEach(p => {
    p.classList.toggle('active', p.dataset.tab === tabName);
  });
}

// ─── Breadcrumb (Phase 2 — for detail modals) ────────────────────
function breadcrumb(parts) {
  return '<div class="breadcrumb">' +
    parts.map((p, i) => i === parts.length - 1
      ? `<b>${escapeHtml(p.label)}</b>`
      : `<a href="#${p.href}" onclick="closeModal();return true">${escapeHtml(p.label)}</a><span class="sep">›</span>`
    ).join('') +
    '</div>';
}

// ─── Routing ─────────────────────────────────────────────────────────
const SCREENS = {};
function navigate(name) {
  // Strip query params from screen name (e.g. "search?q=foo" -> "search")
  const screenName = name.split('?')[0].split('/')[0];
  // highlight nav
  document.querySelectorAll('#sidebar nav a').forEach(a => {
    a.classList.toggle('active', a.dataset.screen === screenName);
  });
  const fn = SCREENS[screenName] || SCREENS.dashboard;
  const c = document.getElementById('content');
  c.innerHTML = '<div class="skel" style="width:200px"></div><div class="skel" style="width:80%"></div><div class="skel"></div>';
  Promise.resolve(fn()).then(html => { c.innerHTML = html; }).catch(e => {
    c.innerHTML = `<div class="card"><h3>Error</h3><p>${escapeHtml(e.message)}</p></div>`;
    toast(e.message || 'Request failed', 'err');
  });
}

// ─── Modal ───────────────────────────────────────────────────────────
function openModal(html) {
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

// ─── Screen 1: Dashboard (B18: clickable KPIs drill-down) ─────────
SCREENS.dashboard = async function() {
  const d = await api('/dashboard/summary');
  const t = d.totals || {};
  const k = d.khkd_target || {};
  const q = d.quotations || {};
  const m = d.milestones || {};
  const f = d.follow_ups || {};
  const dw = d.date_window || {};
  const stages = (d.pipeline && d.pipeline.by_stage) || [];
  return `
    <h1>Dashboard <span class="muted" style="font-size:13px;font-weight:normal">FY ${escapeHtml(d.fiscal_year)}</span></h1>
    ${dw.from ? `<p class="muted">Window: ${escapeHtml(dw.from)} → ${escapeHtml(dw.to)} · ${dw.new_opportunities || 0} new opportunities · ${fmt(dw.new_pipeline_value_usd, '$')} new pipeline value</p>` : ''}
    <div class="grid grid-4">
      <div class="card clickable" onclick="navigate('customers')"><h3>Customers</h3><div class="big">${t.customers||0}</div><div class="sub">${t.contacts||0} contacts</div></div>
      <div class="card clickable" onclick="navigate('pipeline')"><h3>Opportunities</h3><div class="big">${t.opportunities||0}</div><div class="sub">${fmt(d.pipeline?.weighted_value_usd, '$')} weighted</div></div>
      <div class="card clickable" onclick="navigate('quotations')"><h3>Quotations</h3><div class="big">${t.quotations||0}</div><div class="sub">${q.win_rate_pct||0}% win rate · ${q.won||0} won</div></div>
      <div class="card clickable" onclick="navigate('contracts')"><h3>Active Contracts</h3><div class="big">${t.contracts||0}</div><div class="sub">${m.total||0} milestones, ${m.overdue||0} overdue</div></div>
    </div>
    <div class="grid grid-4" style="margin-top:12px">
      <div class="card"><h3>KHKD Coverage</h3><div class="big">${k.coverage_pct||0}%</div><div class="sub">target ${fmt(k.total_revenue,'$')}</div></div>
      <div class="card clickable" onclick="location.hash='#tasks?filter=overdue'"><h3>Tasks</h3><div class="big">${(d.tasks||{}).total||0}</div><div class="sub">${(d.tasks||{}).overdue||0} overdue, ${(d.tasks||{}).pending||0} pending</div></div>

const PRODUCT_GROUPS = ['HRSG', 'Diverter', 'Shipbuilding', 'PV', 'Handling', 'Duct', 'Other'];

SCREENS.pipeline = async function() {
  const params = new URLSearchParams(location.hash.split('?')[1] || '');
  const stage = params.get('stage') || '';
  const pg = params.get('product_group') || '';
  const assignedTo = params.get('assigned_to') || '';

  const qs = new URLSearchParams({ limit: '100' });
  if (stage) qs.set('stage', stage);
  if (pg) qs.set('product_group', pg);
  if (assignedTo) qs.set('assigned_to', assignedTo);

  const d = await api('/opportunities?' + qs.toString());
  return `
    <h1>Pipeline</h1>
    <div class="toolbar">
      <select id="opp-stage" onchange="filterOpps()">
        <option value="">All stages</option>
        ${['PROSPECT','CONTACTED','RFQ_RECEIVED','COSTING','QUOTED','NEGOTIATION','WON','LOST','IN_PROGRESS']
          .map(s => `<option ${s===stage?'selected':''}>${s}</option>`).join('')}
      </select>
      <select id="opp-pg" onchange="filterOpps()">
        <option value="">All groups</option>
        ${PRODUCT_GROUPS.map(g => `<option ${g===pg?'selected':''}>${g}</option>`).join('')}
      </select>
      <input id="opp-assigned" placeholder="Assigned to" value="${escapeHtml(assignedTo)}"
             onkeydown="if(event.key==='Enter')filterOpps()" />
      <div class="spacer"></div>
      <button class="primary" onclick="oppCreateModal()">+ New Opportunity</button>
    </div>
    <p class="muted">${d.total} total · showing ${d.items.length}</p>
    <table><thead><tr>
      <th>Project</th><th>Customer</th><th>Stage</th><th>Group</th>
      <th class="right">Value</th><th class="right">Win %</th>
      <th>AM</th>
    </tr></thead><tbody>
    ${d.items.map(o => `<tr onclick="openOpportunity('${o.id}')" style="cursor:pointer">
      <td>${escapeHtml(o.project_name||'')}</td>
      <td>${escapeHtml(o.customer_name||'')}</td>
      <td>${statusPill(o.stage||'')}</td>
      <td>${escapeHtml(o.product_group||'')}</td>
      <td class="right">${fmt(o.contract_value_usd, '$')}</td>
      <td class="right">${o.win_probability||0}%</td>
      <td>${escapeHtml(o.assigned_to||'')}</td>
    </tr>`).join('')}
    </tbody></table>
  `;
};

function filterOpps() {
  const qs = new URLSearchParams();
  const s = document.getElementById('opp-stage').value;
  const pg = document.getElementById('opp-pg').value;
  const a = document.getElementById('opp-assigned').value.trim();
  if (s) qs.set('stage', s);
  if (pg) qs.set('product_group', pg);
  if (a) qs.set('assigned_to', a);
  location.hash = '#pipeline' + (qs.toString() ? '?' + qs.toString() : '');
  navigate('pipeline');
}

async function changeOppStage(oppId, target, current) {
  // LOST requires loss_reason — prompt before mutating.
  let body = { stage: target };
  if (target === 'LOST') {
    const reason = prompt('Loss reason (required):');
    if (!reason) { toast('Loss reason required', 'err'); return; }
    const competitor = prompt('Competitor (optional):') || null;
    body.loss_reason = reason;
    body.competitor = competitor;
  } else if (target === 'WON') {
    if (!confirm(`Move to WON? This will auto-create a contract + 3 milestones + commission record.`)) return;
  }
  try {
    const r = await api('/opportunities/' + oppId, { method: 'PATCH', body });
    let msg = `Stage: ${current} → ${target}`;
    if (r.side_effects && r.side_effects.contract_id) {
      msg += ` · Contract auto-created (${r.side_effects.milestone_ids.length} milestones)`;
    }
    toast(msg, 'ok');
    closeModal();
    setTimeout(() => openOpportunity(oppId), 50);
  } catch (e) { toast(e.message, 'err'); }
}

async function quoteAction(id, action, current) {
  let body = null;
  if (action === 'lose') {
    const reason = prompt('Loss reason (required):');
    if (!reason) { toast('Loss reason required', 'err'); return; }
    const competitor = prompt('Competitor (optional):') || null;
    body = { loss_reason: reason, competitor };
  } else if (action === 'win') {
    if (!confirm('Mark WON? This cascades to the linked opportunity (auto contract + milestones).')) return;
  }

  try {
    const r = await api(`/quotations/${id}/${action}`, { method: 'POST', body });
    let msg = `Quotation marked ${r.status}`;
    if (r.opportunity_side_effects) {
      msg += ` · Opportunity also WON · contract created`;
    } else if (r.suggest_opportunity_lost) {
      msg += ` · All sibling quotes also LOST — consider closing the opportunity`;
    }
    toast(msg, 'ok');
    closeModal();
    setTimeout(() => openQuotation(id), 50);
  } catch (e) { toast(e.message, 'err'); }
}

    <div class="kanban" id="task-board">
      ${TASK_COLUMNS.map(col => `
        <div class="col" data-col="${col}"
             ondragover="event.preventDefault();this.classList.add('drag-over')"
             ondragleave="this.classList.remove('drag-over')"
             ondrop="dropTask(event,'${col}')">
          <h3>${col} <span class="muted">(${(board[col]||[]).length})</span></h3>
          ${(board[col]||[]).slice(0, 50).map(t => taskCard(t, col)).join('') || '<div class="empty muted">empty</div>'}
        </div>`).join('')}
    </div>
  `;
}

function taskCard(t, col) {
  return `
    <div class="item" draggable="true"
         data-task-id="${t.id}" data-current-status="${col}"
         ondragstart="dragTaskStart(event)"
         ondragend="this.classList.remove('dragging')"
         onclick="openTask('${t.id}')">
      <span class="priority ${t.priority||'NORMAL'}"></span>
      <b>${escapeHtml(t.title||'(untitled)')}</b>
      <div class="muted" style="font-size:11px">${escapeHtml(t.task_type||'')} · ${escapeHtml(t.assigned_to||'?')}</div>
      ${t.due_date ? `<div class="muted" style="font-size:11px">Due: ${escapeHtml(t.due_date.slice(0,10))}</div>` : ''}
    </div>
  `;
}

function dragTaskStart(event) {
  const card = event.currentTarget;
  card.classList.add('dragging');
  event.dataTransfer.setData('text/task-id', card.dataset.taskId);
  event.dataTransfer.setData('text/current-status', card.dataset.currentStatus);
  event.dataTransfer.effectAllowed = 'move';
}

async function dropTask(event, targetCol) {
  event.preventDefault();
  const col = event.currentTarget;
  col.classList.remove('drag-over');
  const taskId = event.dataTransfer.getData('text/task-id');
  const currentStatus = event.dataTransfer.getData('text/current-status');
  if (!taskId || currentStatus === targetCol) return;

  try {
    const r = await api('/tasks/' + taskId, {
      method: 'PATCH',
      body: { status: targetCol },
    });
    toast(`Task moved: ${currentStatus} → ${targetCol}`, 'ok');
    navigate('tasks');
  } catch (e) {
    toast(e.message || 'Invalid transition', 'err');
    // No need to manually revert — the next render will show the original state
  }
}

async function loadEmail(id, rowEl) {

  try {
    const d = await api('/emails/' + id);

    target.innerHTML = `<div class="empty">${escapeHtml(err.message)}</div>`;

        </tr>`).join('')}</tbody></table>` : '<div class="empty">No milestones.</div>'}
    </div>

    <div class="tab-panel" data-tab="settlements">
      ${settlements.length ? `<table><thead><tr><th>Date</th><th>Status</th><th class="right">Planned</th><th class="right">Actual</th></tr></thead>
        <tbody>${settlements.map(s => `<tr>
          <td>${escapeHtml((s.settlement_date||'').slice(0,10))}</td>
          <td>${statusPill(s.settlement_status||'')}</td>
          <td class="right">${fmt(s.planned_value_usd, '$')}</td>
          <td class="right">${fmt(s.actual_revenue_usd, '$')}</td>
        </tr>`).join('')}</tbody></table>` : '<div class="empty">No settlement yet.</div>'}
    </div>

    <div style="margin-top:16px;text-align:right">
      <button onclick="closeModal()">Close</button>
    </div>
  `);
}

async function saveContract(id) {
  try {
    await api('/contracts/' + id, { method: 'PATCH', body: {
      contract_status: document.getElementById('ci-status').value,
    }});
    toast('Contract saved', 'ok');
    closeModal();
    setTimeout(() => openContract(id), 50);
  } catch (e) { toast(e.message, 'err'); }
}

// ─── Screen 11: Reports (B12 frontend) ───────────────────────────
SCREENS.reports = async function() {
  const d = await api('/reports/configs');
  return `
    <h1>Reports</h1>
    <div class="toolbar">
      <button class="primary" onclick="seedReportConfigs()">+ Seed default configs</button>
      <a href="/docs" target="_blank"><button>API Docs</button></a>
    </div>
    ${d.items && d.items.length ? `<table><thead><tr>
      <th>Name</th><th>Type</th><th>Last run</th><th>Runs</th><th></th>
    </tr></thead><tbody>
    ${d.items.map(c => `<tr>
      <td><b>${escapeHtml(c.report_name||'')}</b><div class="muted" style="font-size:11px">${escapeHtml(c.description||'')}</div></td>
      <td>${pill(c.report_type||'', 'info')}</td>
      <td>${escapeHtml((c.last_run_at||'never').slice(0,16))}</td>
      <td>${c.run_count||0}</td>
      <td>
        <button onclick="runReport('${c.id}','json')">JSON</button>
        <button onclick="runReport('${c.id}','csv')">CSV</button>
        <button onclick="runReport('${c.id}','xlsx')">XLSX</button>
      </td>
    </tr>`).join('')}
    </tbody></table>` : '<div class="empty">No report configs. Click "Seed default configs" to bootstrap.</div>'}
  `;
};

async function seedReportConfigs() {
  try {
    const r = await api('/reports/configs/seed-defaults', { method: 'POST' });
    toast(r.summary || 'Seeded', 'ok');
    navigate('reports');
  } catch (e) { toast(e.message, 'err'); }
}

async function runReport(configId, fmt) {
  if (fmt === 'json') {
    try {
      const r = await api(`/reports/configs/${configId}/run?fmt=json`, { method: 'POST' });
      const rows = r.rows || [];
      openModal(`
        <h2 style="margin-top:0">${escapeHtml(r.config_name||'Report')}</h2>
        <p class="muted">${rows.length} rows · generated ${escapeHtml((r.generated_at||'').slice(0,16))}</p>
        ${rows.length ? `<table><thead><tr>${Object.keys(rows[0]).map(k => `<th>${escapeHtml(k)}</th>`).join('')}</tr></thead><tbody>
          ${rows.slice(0, 200).map(row => `<tr>${Object.values(row).map(v => `<td>${escapeHtml(typeof v === 'number' ? v.toString() : (v||''))}</td>`).join('')}</tr>`).join('')}
        </tbody></table>${rows.length > 200 ? `<p class="muted">… and ${rows.length - 200} more rows. Download CSV for full data.</p>` : ''}` : '<div class="empty">No rows.</div>'}
        <div style="text-align:right;margin-top:16px"><button onclick="closeModal()">Close</button></div>
      `);
    } catch (e) { toast(e.message, 'err'); }
  } else {
    // CSV / XLSX — open in new tab so the browser handles the download.
    // Pass API key via fetch instead of GET param (key shouldn't be in URL).
    try {
      const r = await fetch(`${API_BASE}/reports/configs/${configId}/run?fmt=${fmt}`, {
        method: 'POST',
        headers: { 'X-API-Key': API_KEY },
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      // Server sets Content-Disposition; browser uses it for filename.
      a.download = `report-${Date.now()}.${fmt}`;
      a.click();
      URL.revokeObjectURL(url);
      toast(`Report downloaded (${fmt})`, 'ok');
    } catch (e) { toast(e.message, 'err'); }
  }
}

// ─── B18: Search drill-down + dashboard click-through ─────────────
async function doSearch() {
  const q = document.getElementById('search-q').value.trim();
  if (q.length < 2) return;
  location.hash = '#search?q=' + encodeURIComponent(q);
  const d = await api('/search?q=' + encodeURIComponent(q));
  const out = document.getElementById('search-results');
  if (!d.results.length) { out.innerHTML = '<div class="empty">No results.</div>'; return; }
  out.innerHTML = `
    <p class="muted">${d.total} hits — ${Object.entries(d.counts_by_type).map(([k,v]) => `${k}: ${v}`).join(' · ')}</p>
    ${d.results.map(r => `
      <a class="search-result" href="javascript:void(0)" onclick="openSearchResult('${r.entity_type}','${r.entity_id}','${escapeHtml(r.entity_id_secondary||'')}')">
        <span class="type">${r.entity_type}</span>
        <b>${escapeHtml(r.title||'')}</b>
        <span class="muted"> — ${escapeHtml(r.subtitle||'')}</span>
      </a>
    `).join('')}
  `;
}

function openSearchResult(type, id, secondary) {
  // B18: route search results to the correct screen + open detail.
  const handlers = {
    customer:    () => { navigate('customers'); setTimeout(() => openCustomer(id), 80); },
    contact:     () => {
      // Contacts open inside the parent customer 360.
      const customerId = secondary || id;
      navigate('customers'); setTimeout(() => openCustomer(customerId), 80);
    },
    opportunity: () => { navigate('pipeline'); setTimeout(() => openOpportunity(id), 80); },
    quotation:   () => { navigate('quotations'); setTimeout(() => openQuotation(id), 80); },
    email:       () => { openEmail(id); },
    task:        () => { navigate('tasks'); setTimeout(() => openTask(id), 80); },
    contract:    () => { navigate('contracts'); setTimeout(() => openContract(id), 80); },
  };
  (handlers[type] || (() => toast(`No drill-down for type: ${type}`, 'warn')))();
}

// Override notification bell to show dropdown instead of navigating
let _notifDropdownOpen = false;
async function showNotifDropdown(event) {
  event.stopPropagation();
  const dd = document.getElementById('notif-dropdown');
  if (_notifDropdownOpen) { dd.classList.remove('open'); _notifDropdownOpen = false; return; }
  dd.innerHTML = '<div style="padding:12px"><div class="skel"></div><div class="skel"></div></div>';
  dd.classList.add('open');
  _notifDropdownOpen = true;
  try {
    const d = await api('/notifications?limit=10');
    if (!(d.items||[]).length) {
      dd.innerHTML = '<div class="empty" style="padding:24px">No notifications.</div>';
      return;
    }
    dd.innerHTML = (d.items || []).map(n => `
      <div class="notif-item ${n.is_read?'':'unread'}"
           onclick="handleNotifClick('${n.entity_type||''}','${n.entity_id||''}','${n.id}')">
        <div><b>${escapeHtml(n.title||'')}</b></div>
        <div class="muted" style="font-size:11px">${escapeHtml(n.message||'')}</div>
        <div class="muted" style="font-size:10px">${escapeHtml((n.created_at||'').slice(0,16))}</div>
      </div>
    `).join('') + `<div style="padding:8px;text-align:center;border-top:1px solid var(--border)">
      <a href="#" onclick="closeNotifDropdown();navigate('notifications');return false">View all →</a>
    </div>`;
  } catch (e) {
    dd.innerHTML = `<div class="empty">${escapeHtml(e.message)}</div>`;
  }
}
function closeNotifDropdown() {
  document.getElementById('notif-dropdown').classList.remove('open');
  _notifDropdownOpen = false;
}
async function handleNotifClick(entityType, entityId, notifId) {
  closeNotifDropdown();
  // Mark read in background.
  api('/notifications/' + notifId + '/read', { method: 'PATCH' })
    .then(refreshNotificationBell).catch(() => {});
  // Drill into the source entity if we know its type.
  if (entityType && entityId) {
    openSearchResult(entityType, entityId, '');
  } else {
    navigate('notifications');
  }
}
document.addEventListener('click', closeNotifDropdown);

// Bind dropdown to bell on boot.
(function bindBell(){
  const bell = document.getElementById('notif-bell');
  if (bell) {
    bell.removeAttribute('onclick');
    bell.addEventListener('click', showNotifDropdown);
  }
})();
